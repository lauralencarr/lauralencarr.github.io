<Jogo Higor Lourenço>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Cobrinha Higor</title>
    <style>
        body {
            background-color: rgb(156, 135, 195);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        canvas {
            border: 1px solid #f65ba4;
        }
    </style>
</head>
<body>

    <canvas id="snakeCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');

        const boxSize = 20;
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let direction = 'right';

        function draw() {
            // Limpa o canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenha a cobra
            ctx.fillStyle = 'black';
            snake.forEach(segment => {
                ctx.fillRect(segment.x * boxSize, segment.y * boxSize, boxSize, boxSize);
            });

            // Desenha a comida
            ctx.fillStyle = 'pink';
            ctx.fillRect(food.x * boxSize, food.y * boxSize, boxSize, boxSize);
        }

        function move() {
            // Move a cabeça da cobra na direção correta
            const head = { ...snake[0] };
            switch (direction) {
                case 'up':
                    head.y -= 1;
                    break;
                case 'down':
                    head.y += 1;
                    break;
                case 'left':
                    head.x -= 1;
                    break;
                case 'right':
                    head.x += 1;
                    break;
            }

            // Adiciona a nova cabeça à frente da cobra
            snake.unshift(head);

            // Verifica se a cobra comeu a comida
            if (head.x === food.x && head.y === food.y) {
                // Gera uma nova posição para a comida
                food = {
                    x: Math.floor(Math.random() * (canvas.width / boxSize)),
                    y: Math.floor(Math.random() * (canvas.height / boxSize))
                };
            } else {
                // Remove a cauda da cobra
                snake.pop();
            }
        }

        function checkCollision() {
            // Verifica se a cobra colidiu com a parede ou consigo mesma
            const head = snake[0];
            if (
                head.x < 0 || head.x >= canvas.width / boxSize ||
                head.y < 0 || head.y >= canvas.height / boxSize ||
                snake.slice(1).some(segment => segment.x === head.x && segment.y === head.y)
            ) {
                // Fim do jogo
                alert('Game Over!');
                resetGame();
            }
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            food = { x: 15, y: 15 };
            direction = 'right';
        }

        function gameLoop() {
            move();
            checkCollision();
            draw();
        }

        document.addEventListener('keydown', event => {
            switch (event.key) {
                case 'ArrowUp':
                    direction = 'up';
                    break;
                case 'ArrowDown':
                    direction = 'down';
                    break;
                case 'ArrowLeft':
                    direction = 'left';
                    break;
                case 'ArrowRight':
                    direction = 'right';
                    break;
            }
        });

        // Alteração para usar URL absoluta
        const baseURL = 'https://lauralencarr.github.io/lauralencarr.github.io';
        setInterval(gameLoop, 100); // Atualiza o jogo a cada 100 milissegundos
    </script>

</body>
</html>
